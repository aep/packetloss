version: v2
clean: true
plugins:
  # Go types for the builder.
  - local: protoc-gen-go
    out: builder/internal/pb
    opt: paths=source_relative
  # TypeScript types (protobuf-es) for the Astro web layer.
  # protoc-gen-es is installed as a dev dependency of web/ (see `make install`).
  - local: web/node_modules/.bin/protoc-gen-es
    out: web/src/gen
    opt:
      - target=ts
      - import_extension=none
