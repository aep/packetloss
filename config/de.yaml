# Germany. Providers seeded from bgp.tools/rankings/DE?sort=cone, curated to networks
# with RIPE Atlas probe coverage. Targets = hyperscalers/clouds + top eyeball nets (APNIC).
# ASNs/addresses marked "verify" are best-effort seeds — confirm during curation.
code: de
name: Germany

# Top 100 DE networks by AS Cone Rank (bgp.tools/rankings/DE?sort=cone), in rank order.
# probe_ids / proxy notes below are hand-curated for nets with no clean native DE probe;
# leave them in place when refreshing the ranking.
#
# `kind` classifies each network so the web frontend can filter (cone rank rewards
# transit fan-out, so hosting/colo nets float to the top and crowd out the eyeball
# ISPs people actually care about). Values:
#   eyeball  — access ISP (consumer/business broadband, cable, Stadtwerke, fiber, edu)
#   transit  — carrier / backbone / wholesale IP transit
#   content  — hosting / colo / datacenter / cloud / CDN / DDoS / vanity-AS
#   ixp      — internet exchange management ASN
providers:
  - { asn: 3320,  name: Deutsche Telekom, kind: eyeball }   # #1 cone — DTAG
  # AS5405 has no live DE probe of its own; AS48777 (DARC e.V.) is the cleanest topology
  # downstream — only 3 upstreams observed, ~77% of v4 path obs transit AS5405 — so probe
  # 1009864 is used as a best-effort proxy. Score is a transit blend, not pure-AS5405.
  - { asn: 5405,  name: Inter.link, kind: transit, probe_ids: [1009864] }   # #2 cone
  # AS33891 has zero RIPE Atlas probes anywhere. AS210793 (Altonetz GmbH) is BGP
  # single-homed behind it (100% of v4 path obs transit AS33891, no other upstream),
  # so its 3 live DE probes are used as proxies. Cleaner attribution than AS5405's.
  - { asn: 33891, name: Core Backbone, kind: transit, probe_ids: [29203, 62096, 1007733] }  # #3 cone
  - { asn: 50629, name: LWLcom, kind: transit }             # #4 cone
  - { asn: 24961, name: WIIT (fka myLoc), kind: content }   # #5 cone
  # AS13237 (euNetworks/LambdaNet) has no native DE probes. AS203520 (Xantaro) is BGP
